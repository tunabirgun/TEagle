name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: scientific-core + native tests
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: System libraries for Qt (offscreen platform)
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/backend/requirements.txt pytest
      - name: Run hermetic test suite (no network, no WSL)
        run: python -m pytest -m "not network and not wsl" -q
