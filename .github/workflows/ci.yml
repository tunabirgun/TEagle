name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: scientific-core tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install primer3-py==2.3.0 pytest
      - name: Run hermetic test suite (unit + golden, no network)
        run: python -m pytest -m "not network" -q
